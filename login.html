-weight:800;text-align:center;margin-bottom:1.75rem;letter-spacing:-.5px}.duo-alert{padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.88rem;font-weight:500;text-align:center;display:none}.duo-alert.show{display:block}.duo-alert-error{background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.35);color:#fc8181}.duo-alert-success{background:rgba(46,213,115,.1);border:1px solid rgba(46,213,115,.3);color:var(--success)}.duo-google-btn{width:100%;padding:.85rem 1rem;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg-card);color:var(--text);font-weight:700;font-size:.95rem;font-family:'DM Sans','Segoe UI',Arial,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:border-color .2s,background .2s,transform .15s;letter-spacing:.1px;margin-bottom:.85rem}.duo-google-btn:hover{border-color:var(--border-f);background:#243047;transform:translateY(-1px)}.duo-google-btn:active{transform:translateY(0)}.duo-google-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.duo-divider{display:flex;align-items:center;gap:1rem;margin:.25rem 0 1rem;color:var(--muted);font-size:.8rem;font-weight:600;letter-spacing:.8px}.duo-divider::after,.duo-divider::before{content:'';flex:1;height:1px;background:var(--border)}.duo-field{position:relative;margin-bottom:.75rem}.duo-input{width:100%;padding:.9rem 1rem;border-radius:var(--radius);border:2px solid var(--border);background:var(--input-bg);color:var(--text);font-size:.95rem;font-family:'DM Sans','Segoe UI',Arial,sans-serif;transition:border-color .2s,box-shadow .2s;outline:0}.duo-input::placeholder{color:var(--muted)}.duo-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(230,57,70,.15)}.duo-pw-wrap{position:relative}.duo-pw-wrap .duo-input{padding-right:5.5rem}.duo-forgot-btn{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:0 0;border:none;color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.8px;cursor:pointer;font-family:'DM Sans','Segoe UI',Arial,sans-serif;padding:.25rem .4rem;border-radius:4px;transition:color .2s}.duo-forgot-btn:hover{color:var(--text)}.duo-submit-btn{width:100%;padding:.9rem 1rem;margin-top:.25rem;border-radius:var(--radius);border:none;background:var(--primary);color:#fff;font-size:1rem;font-weight:800;font-family:'DM Sans','Segoe UI',Arial,sans-serif;cursor:pointer;letter-spacing:.3px;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 16px rgba(230,57,70,.35);display:flex;align-items:center;justify-content:center;gap:.6rem}.duo-submit-btn:hover{background:var(--primary-h);transform:translateY(-1px);box-shadow:0 6px 22px rgba(230,57,70,.45)}.duo-submit-btn:active{transform:translateY(0)}.duo-submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}.duo-spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}.duo-spinner.hidden{display:none}@keyframes spin{to{transform:rotate(360deg)}}.duo-rate-msg{font-size:.82rem;color:#fbb6b6;text-align:center;margin-top:.5rem;min-height:1.2rem}.duo-switch{text-align:center;margin-top:1.5rem;font-size:.87rem;color:var(--muted)}.duo-switch a{color:var(--primary);font-weight:700;text-decoration:none;margin-left:.3rem}.duo-switch a:hover{text-decoration:underline}.duo-security{text-align:center;margin-top:1.25rem;font-size:.72rem;color:#4a5568;line-height:1.6}@media (max-width:480px){.duo-card{padding:2rem 1.25rem}.duo-card-title{font-size:1.45rem}.duo-topbar{padding:0 1rem}.duo-logo-text{display:none}}.duo-forgot-link{display:block;width:100%;text-align:right;background:0 0;border:none;color:var(--muted);font-size:.78rem;font-weight:700;letter-spacing:.6px;cursor:pointer;font-family:'DM Sans','Segoe UI',Arial,sans-serif;padding:.2rem 0 .5rem;transition:color .2s}.duo-forgot-link:hover{color:var(--primary)}.duo-forgot-link:disabled{opacity:.5;cursor:not-allowed}</style><div class="auth-bg"><div class="auth-bg-orb orb-1"></div><div class="auth-bg-orb orb-2"></div><div class="auth-bg-orb orb-3"></div><div class="auth-bg-grid"></div></div><header class="duo-topbar"><a href="index.html"class="duo-close-btn"title="Bağla"aria-label="Ana Səhifəyə qayıt">×</a> <a href="index.html"class="duo-topbar-logo"><div class="duo-logo-mark">A</div><span class="duo-logo-text">Alielenglish</span> </a><a href="register.html"class="duo-signup-btn">QEYDİYYAT</a></header><main class="duo-page"><div class="duo-card"role="main"><h1 class="duo-card-title">Daxil Ol</h1><div id="authError"class="duo-alert duo-alert-error"role="alert"aria-live="assertive"></div><div id="authSuccess"class="duo-alert duo-alert-success"role="status"aria-live="polite"></div><button class="duo-google-btn"onclick="handleGoogleLogin()"type="button"id="googleBtn"><svg width="20"height="20"viewBox="0 0 24 24"><path fill="#4285F4"d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853"d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05"d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335"d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google ilə daxil ol</button><div class="duo-divider">VƏ YA</div><form id="loginForm"onsubmit="handleLoginSubmit(event)"novalidate autocomplete="on"><div class="duo-field"><input type="email"id="loginEmail"class="duo-input"placeholder="Email"required autocomplete="email"inputmode="email"></div><div class="duo-field duo-pw-wrap"><input type="password"id="loginPassword"class="duo-input"placeholder="Şifrə"required autocomplete="current-password"> <button type="button"class="duo-forgot-btn"onclick='toggleEye("loginPassword",this)'id="pwEyeBtn">GÖSTƏR</button></div><button type="button" id="forgotBtn" class="duo-forgot-link" onclick="handleForgotPassword()">ŞİFRƏNİ UNUTDUM?</button><div id="rateLimitMsg"class="duo-rate-msg"></div><button type="submit"class="duo-submit-btn"id="loginBtn"><span id="loginBtnText">DAXİL OL</span> <span class="duo-spinner hidden"id="loginSpinner"></span></button></form><div class="duo-switch">Hesabın yoxdur? <a href="register.html">Qeydiyyatdan keç →</a></div><p class="duo-security">🔒 Firebase Auth · 256-bit SSL<br>Məlumatlarınız tam qorunur</div></main><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getAuth,
    signInWithEmailAndPassword,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    GoogleAuthProvider,
    onAuthStateChanged,
    sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import {
    getFirestore, doc, getDoc, setDoc, serverTimestamp, updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyCxRMtHyTwee7cQuxcJ1eAWibxcyoUKIIs",
    authDomain: "alielenglish.firebaseapp.com",
    projectId: "alielenglish",
    storageBucket: "alielenglish.firebasestorage.app",
    messagingSenderId: "521948914743",
    appId: "1:521948914743:web:613373aaadfe3addedcbb2"
});
const auth = getAuth(app);
const db = getFirestore(app);
const $ = id => document.getElementById(id);
let googleInProgress = false;

function getNextUrl() {
    return new URLSearchParams(location.search).get('next') || 'index.html';
}

function showErr(msg) {
    const el = $('authError');
    el.textContent = msg;
    el.classList.add('show');
    $('authSuccess').classList.remove('show');
}

function showOk(msg) {
    const el = $('authSuccess');
    el.textContent = msg;
    el.classList.add('show');
    $('authError').classList.remove('show');
}

function clearMsgs() {
    $('authError').classList.remove('show');
    $('authSuccess').classList.remove('show');
}

function getErrMsg(code) {
    const map = {
        'auth/user-not-found': '❌ Bu email ilə hesab tapılmadı.',
        'auth/wrong-password': '🔑 Şifrə yanlışdır.',
        'auth/invalid-credential': '❌ Email və ya şifrə yanlışdır.',
        'auth/invalid-email': '📧 Email formatı yanlışdır.',
        'auth/too-many-requests': '⏳ Çox cəhd edildi. Bir müddət gözləyin.',
        'auth/network-request-failed': '🌐 İnternet bağlantısını yoxlayın.',
        'auth/popup-blocked': '🚫 Popup bloklandı — yenidən cəhd edilir...',
        'auth/popup-closed-by-user': '',
        'auth/cancelled-popup-request': '',
        'auth/operation-not-allowed': '⚠️ Google girişi aktivləşdirilməyib.',
        'auth/unauthorized-domain': '⛔ Bu domen Firebase-də icazəli deyil.',
        'auth/user-disabled': '🚫 Bu hesab deaktiv edilib.',
    };
    return map[code] ?? `⚠️ Xəta: ${code}`;
}

// Redirect nəticəsini yoxla (redirect üsulu istifadə edildikdə)
async function checkRedirectResult() {
    try {
        const result = await getRedirectResult(auth);
        if (result && result.user) {
            await saveGoogleUser(result.user);
            showOk('✅ Google ilə uğurla daxil oldunuz!');
            setTimeout(() => window.location.replace(getNextUrl()), 800);
        }
    } catch (e) {
        const msg = getErrMsg(e.code);
        if (msg) showErr(msg);
    }
}
checkRedirectResult();

// Auth vəziyyəti
onAuthStateChanged(auth, e => {
    if (!googleInProgress && e) {
        const btn = $('googleBtn');
        if (btn) { btn.disabled = true; btn.style.opacity = '.4'; }
        window.location.replace(getNextUrl());
    }
});

// Google istifadəçisini Firestore-a saxla
async function saveGoogleUser(user) {
    try {
        const ref = doc(db, 'users', user.uid);
        const snap = await getDoc(ref);
        const isAdmin = user.email === 'englishaliel@gmail.com';
        if (!snap.exists()) {
            await setDoc(ref, {
                name: user.displayName || user.email?.split('@')[0] || 'İstifadəçi',
                email: user.email || '',
                level: 'A1',
                role: isAdmin ? 'admin' : 'user',
                currentStreak: 0, longestStreak: 0,
                lastActiveDate: new Date().toDateString(),
                activeDays: 1, wordsLearned: 0, testsCompleted: 0,
                badges: ['🌱 Başlanğıc'],
                favorites: { words: [], grammar: [], phrases: [] },
                weeklyActivity: [false, false, false, false, false, false, false],
                testHistory: [],
                createdAt: serverTimestamp(),
                privacy: { showProfile: false, showStreak: true },
                aiUsage: { count: 0, lastReset: new Date().toISOString() }
            });
        } else {
            const d = snap.data();
            const upd = {};
            if (isAdmin && d.role !== 'admin') upd.role = 'admin';
            if ((!d.name || d.name === 'İstifadəçi') && user.displayName) upd.name = user.displayName;
            if (Object.keys(upd).length) await updateDoc(ref, upd);
        }
    } catch (e) { console.warn('saveGoogleUser:', e); }
}

// Rate Limiter
const RL = { n: 0, until: 0, delays: [0, 0, 0, 30000, 120000, 900000] };
let rlTimer = null;
function checkRL() {
    if (Date.now() < RL.until) return Math.ceil((RL.until - Date.now()) / 1000);
    RL.n++;
    const delay = RL.delays[Math.min(RL.n, RL.delays.length - 1)];
    if (delay) RL.until = Date.now() + delay;
    return 0;
}
function resetRL() { RL.n = 0; RL.until = 0; }
function startRLCountdown(sec) {
    const el = $('rateLimitMsg');
    $('loginBtn').disabled = true;
    clearInterval(rlTimer);
    let s = sec;
    el.textContent = `🔒 ${s}s sonra yenidən cəhd edin`;
    rlTimer = setInterval(() => {
        s--;
        if (s <= 0) {
            clearInterval(rlTimer);
            el.textContent = '';
            $('loginBtn').disabled = false;
        } else {
            el.textContent = `🔒 ${s}s sonra yenidən cəhd edin`;
        }
    }, 1000);
}

// Email/Şifrə ilə giriş
window.handleLoginSubmit = async function (e) {
    e.preventDefault();
    clearMsgs();
    const wait = checkRL();
    if (wait > 0) { startRLCountdown(wait); return; }
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value;
    if (!email || !password) { showErr('Bütün sahələri doldurun.'); return; }
    const btn = $('loginBtn');
    btn.disabled = true;
    $('loginBtnText').textContent = 'YÜKLƏNİR...';
    $('loginSpinner').classList.remove('hidden');
    try {
        await signInWithEmailAndPassword(auth, email, password);
        resetRL();
        showOk('✅ Uğurla daxil oldunuz!');
        setTimeout(() => window.location.replace(getNextUrl()), 700);
    } catch (err) {
        const msg = getErrMsg(err.code);
        if (msg) showErr(msg);
        btn.disabled = false;
        $('loginBtnText').textContent = 'DAXİL OL';
        $('loginSpinner').classList.add('hidden');
    }
};

// Google ilə giriş (Popup → fallback Redirect)
window.handleGoogleLogin = async function () {
    clearMsgs();
    const btn = $('googleBtn');
    btn.disabled = true;
    btn.style.opacity = '.6';
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Yüklənir...`;
    googleInProgress = true;
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
        // Əvvəlcə Popup ilə cəhd et
        const result = await signInWithPopup(auth, provider);
        await saveGoogleUser(result.user);
        showOk('✅ Google ilə uğurla daxil oldunuz!');
        googleInProgress = false;
        setTimeout(() => window.location.replace(getNextUrl()), 800);
    } catch (popupErr) {
        // Popup bloklandısa → Redirect üsuluna keç
        if (popupErr.code === 'auth/popup-blocked' || popupErr.code === 'auth/popup-closed-by-user') {
            showOk('🔄 Yönləndirilirsiniz... (popup blok edildi)');
            try {
                await signInWithRedirect(auth, provider);
                // Redirect başladı — səhifə yenidən yüklənəcək
                return;
            } catch (redirErr) {
                const msg = getErrMsg(redirErr.code);
                if (msg) showErr(msg);
            }
        } else if (popupErr.code !== 'auth/cancelled-popup-request') {
            const msg = getErrMsg(popupErr.code);
            if (msg) showErr(msg);
        }
        googleInProgress = false;
        btn.disabled = false;
        btn.style.opacity = '';
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google ilə daxil ol`;
    }
};

// Şifrəni Unutdum
window.handleForgotPassword = async function () {
    clearMsgs();
    const email = $('loginEmail').value.trim();
    if (!email) {
        showErr('Şifrəni sıfırlamaq üçün email daxil edin.');
        $('loginEmail').focus();
        return;
    }
    const btn = $('forgotBtn');
    btn.disabled = true;
    btn.textContent = 'GÖNDƏRİLİR...';
    try {
        await sendPasswordResetEmail(auth, email, {
            url: 'https://aliel2023.github.io/alielenglish/login.html',
            handleCodeInApp: false
        });
        showOk(`✅ Şifrə sıfırlama linki ${email} ünvanına göndərildi. Spam qovluğunu da yoxlayın.`);
    } catch (err) {
        const msgs = {
            'auth/user-not-found': '❌ Bu email ilə hesab tapılmadı.',
            'auth/invalid-email': '📧 Email formatı yanlışdır.',
            'auth/too-many-requests': '⏳ Çox cəhd edildi. Bir az gözləyin.',
        };
        showErr(msgs[err.code] || '⚠️ Xəta baş verdi. Yenidən cəhd edin.');
    } finally {
        btn.disabled = false;
        btn.textContent = 'ŞIFRƏNI UNUTDUM';
    }
};

// Şifrə göstər/gizlət
window.toggleEye = function (inputId, btn) {
    const inp = document.getElementById(inputId);
    if (!inp) return;
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    btn.textContent = isPass ? 'GİZLƏT' : 'GÖSTƏR';
};
</script>
